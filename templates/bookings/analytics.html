<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics | Bookings Analytics</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 760px;
    }

    /* HEADER CARD */
    .header-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 2rem 2.5rem 1.5rem;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
      position: relative;
      overflow: hidden;
    }

    .header-card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(139,92,246,0.35) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-card h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .header-card h1 span {
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-card p {
      margin-top: 0.4rem;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.5);
    }

    /* STATS GRID */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      border-radius: 16px;
      padding: 1.4rem 1.25rem;
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .stat-card:hover {
      transform: translateY(-4px) scale(1.02);
    }

    .stat-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(255,255,255,0.18);
      pointer-events: none;
    }

    .stat-card.blue {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      box-shadow: 0 10px 30px rgba(37,99,235,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .stat-card.green {
      background: linear-gradient(135deg, #065f46, #10b981);
      box-shadow: 0 10px 30px rgba(16,185,129,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .stat-card.red {
      background: linear-gradient(135deg, #7f1d1d, #ef4444);
      box-shadow: 0 10px 30px rgba(239,68,68,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .stat-card.amber {
      background: linear-gradient(135deg, #78350f, #f59e0b);
      box-shadow: 0 10px 30px rgba(245,158,11,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .stat-icon { font-size: 1.5rem; margin-bottom: 0.75rem; display: block; }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 0.35rem;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    /* FOOTER CARD */
    .footer-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
    }

    .footer-card p { font-size: 0.8rem; color: rgba(255,255,255,0.4); }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.5rem 1.1rem;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 10px;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(124,58,237,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn-back:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124,58,237,0.65), inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .btn-back:active { transform: translateY(0); }

    @media (max-width: 480px) {
      .header-card h1 { font-size: 1.35rem; }
      .stat-value { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="header-card">
      <h1>Analytics for <span>{{ profile.user.username }}</span></h1>
      <p>Bookings Analytics &mdash; Influencer Dashboard</p>
    </div>

    <div class="stats-grid">

      <div class="stat-card blue">
        <span class="stat-icon">&#128203;</span>
        <div class="stat-label">Total Bookings</div>
        <div class="stat-value">{{ total_bookings }}</div>
      </div>

      <div class="stat-card green">
        <span class="stat-icon">&#9989;</span>
        <div class="stat-label">Approved</div>
        <div class="stat-value">{{ approved_bookings }}</div>
      </div>

      <div class="stat-card red">
        <span class="stat-icon">&#10060;</span>
        <div class="stat-label">Rejected</div>
        <div class="stat-value">{{ rejected_bookings }}</div>
      </div>

      <div class="stat-card amber">
        <span class="stat-icon">&#128176;</span>
        <div class="stat-label">Total Earnings</div>
        <div class="stat-value">&#8377;{{ total_earnings }}</div>
      </div>

    </div>

    <div class="footer-card">
      <p>Bookings Analytics &copy; 2025</p>
      <a href="{% url 'bookings:dashboard' %}" class="btn-back">&#8592; Back to Dashboard</a>
    </div>

  </div>

</body>
</html>
